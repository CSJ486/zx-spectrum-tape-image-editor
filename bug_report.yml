name: Bug Report
description: Report a bug in ZX Spectrum Tape Loader
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below so we can reproduce and fix it.

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of the app is broken?
      options:
        - Spectrumizer
        - BASIC Editor
        - Tape Play
        - WAV Decode
        - Extras & FX
        - Manual
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Tell us the exact steps.
      placeholder: |
        1. Open...
        2. Click...
        3. Choose...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Result
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Result
      placeholder: What happened instead?
    validations:
      required: true

  - type: input
    id: filetype
    attributes:
      label: File Type
      description: If this involves a file, what type was used?
      placeholder: .tap / .wav / .png / .jpg / other

  - type: textarea
    id: notes
    attributes:
      label: Extra Notes
      description: Emulator name, browser, device, or anything useful.
      placeholder: Example: Android Chrome, ZX Spectrum emulator, file size, mode selected...