name: Error Report
description: Report a runtime error, console error, or failed process
title: "[ERROR]: "
labels: ["error"]
body:
  - type: markdown
    attributes:
      value: |
        Please paste the exact error message if possible.

  - type: textarea
    id: message
    attributes:
      label: Error Message
      placeholder: Paste the full error text here.
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: When did it happen?
      options:
        - On page load
        - While importing image
        - While compiling BASIC
        - While exporting TAP
        - While exporting WAV
        - While playing tape
        - While decoding WAV
        - Other
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console / Log Output
      placeholder: Paste any browser console error or log text.

  - type: textarea
    id: details
    attributes:
      label: Details
      placeholder: Browser, device, emulator, selected mode, and file used.