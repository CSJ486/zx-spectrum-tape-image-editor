name: Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: Feature Idea
      placeholder: Describe your idea.
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: Why would this help?
      placeholder: Explain the benefit for ZX Spectrum Tape Loader users.